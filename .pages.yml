media:
  input: public/images
  output: /images

actions:
  - name: deploy-site
    label: Siteyi Yayınla
    workflow: deploy-turhost.yml
    ref: current
    cancelable: false

content:
  - name: products
    label: Ürünler
    type: collection
    path: src/content/products
    filename: "{slug}.md"
    view:
      fields: [title, modelCode, category]
    fields:
      - name: title
        label: Ürün Adı
        type: string
        required: true
      - name: modelCode
        label: Model Kodu
        type: string
        required: true
      - name: category
        label: Kategori
        type: select
        required: true
        options:
          values:
            - value: celik-kapi
              label: Çelik Kapı
            - value: yangin-kapisi
              label: Yangın Kapısı
            - value: bina-giris-kapisi
              label: Bina Giriş Kapısı
      - name: shortDescription
        label: Kısa Açıklama
        type: text
        required: true
      - name: size
        label: Ölçü
        type: string
        required: true
      - name: color
        label: Renk
        type: string
        required: true
      - name: material
        label: Malzeme
        type: string
        required: true
      - name: image
        label: Görsel
        type: image
        required: true
        options:
          path: products
          extensions: [jpg, jpeg, png, webp]
      - name: gallery
        label: Ürün Galerisi
        type: image
        list: true
        required: false
        options:
          path: products
          extensions: [jpg, jpeg, png, webp]
      - name: features
        label: Öne Çıkan Özellikler
        type: string
        list: true
        required: false
      - name: draft
        label: Taslak
        type: boolean
        default: false
      - name: body
        label: Ürün Açıklaması
        type: rich-text
        options:
          format: markdown

  - name: blog
    label: Blog
    type: collection
    path: src/content/blog
    filename: "{slug}.md"
    view:
      fields: [title, publishedAt]
    fields:
      - name: title
        label: Başlık
        type: string
        required: true
      - name: excerpt
        label: Özet
        type: text
        required: true
      - name: publishedAt
        label: Yayın Tarihi
        type: string
        required: true
      - name: cover
        label: Kapak Görseli
        type: image
        required: true
        options:
          path: blog
          extensions: [jpg, jpeg, png, webp]
      - name: draft
        label: Taslak
        type: boolean
        default: false
      - name: body
        label: İçerik
        type: rich-text
        options:
          format: markdown